<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Corpus Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #e6edf3; --text-muted: #8b949e;
  --accent: #58a6ff; --accent-hover: #79c0ff;
  --danger: #f85149; --danger-bg: rgba(248,81,73,0.15);
  --success: #3fb950; --success-bg: rgba(63,185,80,0.15);
  --warning: #d29922; --warning-bg: rgba(210,153,34,0.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Jost', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
.container { max-width: 1000px; margin: 0 auto; padding: 24px; }

nav { display: flex; gap: 20px; padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border); align-items: center; }
nav .logo { font-weight: 700; font-size: 16px; color: var(--accent); margin-right: 8px; }
nav a { color: var(--text-muted); text-decoration: none; font-size: 14px; cursor: pointer; padding: 4px 0; }
nav a:hover, nav a.active { color: var(--text); }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
.card h3 { font-size: 14px; margin-bottom: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 24px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; text-align: center; }
.stat-card .value { font-size: 26px; font-weight: 700; color: var(--accent); }
.stat-card .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

h2 { font-size: 20px; margin-bottom: 16px; }

.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: 'Jost', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.15s; }
.btn:hover { border-color: var(--text-muted); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
.btn-success { background: var(--success); color: #000; border-color: var(--success); font-weight: 600; }
.btn-danger { color: var(--danger); border-color: var(--danger); }
.btn-sm { padding: 3px 8px; font-size: 12px; }

table { width: 100%; border-collapse: collapse; }
th, td { padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
th { color: var(--text-muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500; }
.badge-pending { background: var(--warning-bg); color: var(--warning); }
.badge-approved { background: var(--success-bg); color: var(--success); }
.badge-rejected { background: var(--danger-bg); color: var(--danger); }
.badge-needs_resynth { background: rgba(88,166,255,0.15); color: var(--accent); }
.badge-running { background: rgba(88,166,255,0.15); color: var(--accent); }
.badge-completed { background: var(--success-bg); color: var(--success); }
.badge-failed { background: var(--danger-bg); color: var(--danger); }

.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
.form-group input { width: 100%; padding: 7px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Jost', sans-serif; font-size: 14px; outline: none; }
.form-group input:focus { border-color: var(--accent); }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }

.empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
.empty-state h3 { color: var(--text); margin-bottom: 8px; }

.search-bar { display: flex; gap: 12px; margin-bottom: 16px; }
.search-bar input { flex: 1; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Jost', sans-serif; font-size: 14px; outline: none; }
.search-bar input:focus { border-color: var(--accent); }

.toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }

/* Aligned sentence — inline text with annotated diff spans */
.sentence-display { font-size: 20px; line-height: 2.2; text-align: center; }
.sentence-display .word { display: inline; }
.sentence-display .word-annotated {
  display: inline-flex; flex-direction: column; align-items: center;
  vertical-align: baseline; margin: 0 1px;
}
.sentence-display .word-annotated .written {
  border: 1px solid var(--accent); border-radius: 6px;
  padding: 2px 8px; background: rgba(88,166,255,0.08);
}
.sentence-display .word-annotated .spoken-alt {
  font-size: 13px; color: var(--accent); font-weight: 600;
  margin-top: 2px; white-space: nowrap;
}

/* Full-screen review */
.review-fullscreen {
  position: fixed; inset: 0; background: var(--bg); z-index: 100;
  display: flex; flex-direction: column; overflow: hidden;
}
.review-topbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 24px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.review-body {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 32px; gap: 32px; overflow-y: auto;
}
.review-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 40px; max-width: 900px; width: 100%;
}
.review-actions {
  display: flex; justify-content: center; gap: 24px; flex-shrink: 0;
  padding: 20px; background: var(--surface); border-top: 1px solid var(--border);
}
.review-action-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 12px 32px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-family: 'Jost', sans-serif;
  font-size: 15px; cursor: pointer; transition: all 0.15s; min-width: 100px;
}
.review-action-btn:hover { border-color: var(--text-muted); }
.review-action-btn.approve { border-color: var(--success); color: var(--success); }
.review-action-btn.approve:hover { background: var(--success-bg); }
.review-action-btn.reject { border-color: var(--danger); color: var(--danger); }
.review-action-btn.reject:hover { background: var(--danger-bg); }
.review-action-btn.replay { border-color: var(--accent); color: var(--accent); }
.review-action-btn.replay:hover { background: rgba(88,166,255,0.1); }
.review-action-btn kbd { font-family: 'Jost', sans-serif; font-size: 11px; color: var(--text-muted); background: var(--bg); padding: 1px 6px; border-radius: 3px; border: 1px solid var(--border); }

.progress-bar { width: 100%; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-bar .fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

/* Waveform */
.waveform-container { width: 100%; position: relative; cursor: pointer; }
.waveform-canvas { width: 100%; height: 80px; display: block; border-radius: 6px; }

.play-btn { background: none; border: 1px solid var(--border); border-radius: 50%; width: 28px; height: 28px; color: var(--accent); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; transition: all 0.15s; flex-shrink: 0; }
.play-btn:hover { border-color: var(--accent); background: rgba(88,166,255,0.1); }
.play-btn:disabled { opacity: 0.3; cursor: not-allowed; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function api(path, opts = {}) {
  return fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts })
    .then(r => { if (!r.ok) throw new Error(`${r.status} ${r.statusText}`); const ct = r.headers.get('content-type') || ''; return ct.includes('json') ? r.json() : r.text(); });
}

function useHash() {
  const [hash, setHash] = useState(window.location.hash || '#/');
  useEffect(() => { const h = () => setHash(window.location.hash || '#/'); window.addEventListener('hashchange', h); return () => window.removeEventListener('hashchange', h); }, []);
  return hash;
}

// ==================== TTS ====================
async function fetchTtsBuffer(text) {
  const res = await fetch('/api/tts/preview', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ text }),
  });
  const arrayBuf = await res.arrayBuffer();
  const audioBuf = await audioCtx.decodeAudioData(arrayBuf);
  return audioBuf;
}

function playBuffer(audioBuf, onEnd) {
  const source = audioCtx.createBufferSource();
  source.buffer = audioBuf;
  source.connect(audioCtx.destination);
  source.onended = onEnd || (() => {});
  source.start();
  return source;
}

// ==================== WAVEFORM ====================
function Waveform({ audioBuffer, playing, onSeek }) {
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const startTimeRef = useRef(null);

  useEffect(() => {
    if (!audioBuffer || !canvasRef.current) return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);

    const data = audioBuffer.getChannelData(0);
    const w = rect.width;
    const h = rect.height;
    const step = Math.max(1, Math.floor(data.length / w));

    const draw = (playbackPos) => {
      ctx.clearRect(0, 0, w, h);

      // Draw waveform
      const mid = h / 2;
      for (let x = 0; x < w; x++) {
        const start = x * step;
        let min = 0, max = 0;
        for (let j = 0; j < step && start + j < data.length; j++) {
          const v = data[start + j];
          if (v < min) min = v;
          if (v > max) max = v;
        }
        const topY = mid + min * mid * 0.9;
        const botY = mid + max * mid * 0.9;

        // Color based on playback position
        const samplePos = playbackPos != null ? (playbackPos / audioBuffer.duration) * w : -1;
        if (x < samplePos) {
          ctx.fillStyle = 'rgba(88, 166, 255, 0.7)';
        } else {
          ctx.fillStyle = 'rgba(88, 166, 255, 0.25)';
        }
        ctx.fillRect(x, topY, 1, botY - topY || 1);
      }

      // Playback cursor
      if (playbackPos != null && playbackPos >= 0) {
        const cx = (playbackPos / audioBuffer.duration) * w;
        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(cx, 0);
        ctx.lineTo(cx, h);
        ctx.stroke();
      }
    };

    if (playing) {
      startTimeRef.current = audioCtx.currentTime;
      const animate = () => {
        const elapsed = audioCtx.currentTime - startTimeRef.current;
        if (elapsed <= audioBuffer.duration) {
          draw(elapsed);
          animRef.current = requestAnimationFrame(animate);
        } else {
          draw(null);
        }
      };
      animate();
    } else {
      draw(null);
    }

    return () => { if (animRef.current) cancelAnimationFrame(animRef.current); };
  }, [audioBuffer, playing]);

  return (
    <div className="waveform-container">
      <canvas ref={canvasRef} className="waveform-canvas" />
    </div>
  );
}

// ==================== ALIGNED SENTENCE ====================
// Shows the written form as flowing text. Where the spoken form differs,
// the written word(s) get a pill border with the spoken alternative below.
function AlignedSentence({ text, spoken }) {
  const segments = useMemo(() => diffSegments(text, spoken), [text, spoken]);

  return (
    <div className="sentence-display">
      {segments.map((seg, i) => {
        if (seg.same) {
          return <span key={i} className="word">{seg.written} </span>;
        } else {
          return (
            <span key={i} className="word-annotated">
              <span className="written">{seg.written}</span>
              <span className="spoken-alt">{seg.spoken}</span>
            </span>
          );
        }
      })}
    </div>
  );
}

// Diff the written and spoken forms into segments.
// Each segment is either { same: true, written } or { same: false, written, spoken }.
function diffSegments(written, spoken) {
  if (written === spoken) {
    return [{ same: true, written }];
  }

  const wWords = written.split(/\s+/);
  const sWords = spoken.split(/\s+/);

  // LCS to find matching words (case-insensitive)
  const m = wWords.length, n = sWords.length;
  const dp = Array.from({length: m+1}, () => new Uint16Array(n+1));
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      if (wWords[i-1].toLowerCase() === sWords[j-1].toLowerCase()) {
        dp[i][j] = dp[i-1][j-1] + 1;
      } else {
        dp[i][j] = Math.max(dp[i-1][j], dp[i][j-1]);
      }
    }
  }

  // Backtrack to find which words match
  const wMatched = new Array(m).fill(false);
  const sMatched = new Array(n).fill(false);
  let i = m, j = n;
  while (i > 0 && j > 0) {
    if (wWords[i-1].toLowerCase() === sWords[j-1].toLowerCase()) {
      wMatched[i-1] = true;
      sMatched[j-1] = true;
      i--; j--;
    } else if (dp[i-1][j] >= dp[i][j-1]) {
      i--;
    } else {
      j--;
    }
  }

  // Build segments: walk both arrays, grouping matched (same) and unmatched (diff)
  const segments = [];
  let wi = 0, si = 0;
  while (wi < m || si < n) {
    // Collect a run of matched words
    let sameRun = [];
    while (wi < m && wMatched[wi] && si < n && sMatched[si]) {
      sameRun.push(wWords[wi]);
      wi++; si++;
    }
    if (sameRun.length > 0) {
      segments.push({ same: true, written: sameRun.join(' ') });
    }

    // Collect a run of unmatched words from both sides
    let wRun = [], sRun = [];
    while (wi < m && !wMatched[wi]) { wRun.push(wWords[wi]); wi++; }
    while (si < n && !sMatched[si]) { sRun.push(sWords[si]); si++; }
    if (wRun.length > 0 || sRun.length > 0) {
      segments.push({
        same: false,
        written: wRun.join(' ') || '\u2014',
        spoken: sRun.join(' ') || '\u2014',
      });
    }
  }
  return segments;
}

function PlayBtn({ text, small }) {
  const [playing, setPlaying] = useState(false);
  const play = async () => {
    setPlaying(true);
    try {
      const buf = await fetchTtsBuffer(text);
      playBuffer(buf, () => setPlaying(false));
    } catch(e) { setPlaying(false); }
  };
  return <button className={`play-btn${small ? ' btn-sm' : ''}`} onClick={play} disabled={playing} title="Play TTS">{playing ? '...' : '\u25B6'}</button>;
}

// ==================== NAV ====================
function Nav() {
  const hash = useHash();
  const links = [['#/', 'Overview'], ['#/vocab', 'Vocab'], ['#/sentences', 'Sentences'], ['#/jobs', 'Jobs']];
  return (
    <nav>
      <span className="logo">Corpus Dashboard</span>
      {links.map(([href, label]) => (
        <a key={href} href={href} className={hash === href || (href !== '#/' && hash.startsWith(href)) ? 'active' : ''}>{label}</a>
      ))}
    </nav>
  );
}

// ==================== OVERVIEW ====================
function Overview() {
  const [stats, setStats] = useState(null);
  const [importing, setImporting] = useState(false);
  const load = () => api('/api/stats').then(setStats);
  useEffect(() => { load(); }, []);

  const doImport = async () => {
    setImporting(true);
    await api('/api/vocab/import', { method: 'POST' });
    load();
    setImporting(false);
  };

  if (!stats) return <div className="container"><p>Loading...</p></div>;

  return (
    <div className="container">
      <h2>Pipeline Overview</h2>
      <div className="stats-grid">
        <div className="stat-card"><div className="value">{stats.vocab_total}</div><div className="label">Vocab Terms</div></div>
        <div className="stat-card"><div className="value" style={{color:'var(--warning)'}}>{stats.vocab_reviewed}</div><div className="label">Vocab Reviewed</div></div>
        <div className="stat-card"><div className="value">{stats.vocab_with_override}</div><div className="label">Overrides</div></div>
        <div className="stat-card"><div className="value">{stats.sentences_total}</div><div className="label">Sentences</div></div>
        <div className="stat-card"><div className="value" style={{color:'var(--success)'}}>{stats.sentences_approved}</div><div className="label">Approved</div></div>
        <div className="stat-card"><div className="value" style={{color:'var(--warning)'}}>{stats.sentences_pending}</div><div className="label">Pending</div></div>
        <div className="stat-card"><div className="value">{stats.sentences_with_audio}</div><div className="label">With Audio</div></div>
        <div className="stat-card"><div className="value">{stats.sentences_with_asr}</div><div className="label">With ASR</div></div>
      </div>

      <div className="card">
        <h3>Quick Actions</h3>
        <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
          <button className="btn btn-primary" onClick={doImport} disabled={importing}>{importing ? 'Importing...' : 'Import Vocab from Docs'}</button>
          {stats.sentences_pending > 0 && <a href="#/sentences/review" className="btn btn-success">Review Sentences ({stats.sentences_pending} pending)</a>}
          {stats.sentences_total === 0 && stats.vocab_total > 0 && <a href="#/sentences" className="btn">Generate Sentences</a>}
        </div>
      </div>

      <div className="card">
        <h3>Pipeline</h3>
        <table>
          <tbody>
            <tr><td style={{width:30,textAlign:'center',color:'var(--accent)',fontWeight:700}}>1</td><td>Import vocab from docs</td><td style={{textAlign:'right'}}><span className="badge badge-completed">{stats.vocab_total} terms</span></td></tr>
            <tr><td style={{textAlign:'center',color:'var(--accent)',fontWeight:700}}>2</td><td>Review spoken forms</td><td style={{textAlign:'right'}}><span className="badge badge-pending">{stats.vocab_reviewed}/{stats.vocab_total}</span></td></tr>
            <tr><td style={{textAlign:'center',color:'var(--accent)',fontWeight:700}}>3</td><td>Generate &amp; review sentences</td><td style={{textAlign:'right'}}><span className="badge badge-pending">{stats.sentences_approved} approved</span></td></tr>
            <tr><td style={{textAlign:'center',color:'var(--accent)',fontWeight:700}}>4</td><td>ASR transcription</td><td style={{textAlign:'right'}}><span className="badge badge-pending">{stats.sentences_with_asr}</span></td></tr>
            <tr><td style={{textAlign:'center',color:'var(--accent)',fontWeight:700}}>5</td><td>Train LoRA</td><td style={{textAlign:'right'}}><span className="badge badge-pending">-</span></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ==================== VOCAB ====================
function VocabPage() {
  const [vocab, setVocab] = useState([]);
  const [search, setSearch] = useState('');
  const [loading, setLoading] = useState(true);
  const [editingId, setEditingId] = useState(null);
  const [editValue, setEditValue] = useState('');

  const load = useCallback(() => {
    const p = new URLSearchParams();
    if (search) p.set('search', search);
    p.set('limit', '100');
    api(`/api/vocab?${p}`).then(setVocab).finally(() => setLoading(false));
  }, [search]);
  useEffect(() => { load(); }, [load]);

  const startEdit = (row) => { setEditingId(row.id); setEditValue(row.spoken_override || row.spoken_auto); };
  const saveEdit = async (id) => {
    await api(`/api/vocab/${id}`, { method: 'POST', body: JSON.stringify({ spoken_override: editValue }) });
    setEditingId(null); load();
  };
  const toggleReviewed = async (row) => {
    await api(`/api/vocab/${row.id}`, { method: 'POST', body: JSON.stringify({ reviewed: !row.reviewed }) });
    load();
  };

  return (
    <div className="container">
      <h2>Vocabulary</h2>
      <div className="search-bar">
        <input placeholder="Search terms..." value={search} onChange={e => setSearch(e.target.value)} />
      </div>
      {loading ? <p>Loading...</p> : vocab.length === 0 ? (
        <div className="empty-state"><h3>No results</h3></div>
      ) : (
        <div className="card" style={{padding:0,overflow:'hidden'}}>
          <table>
            <thead><tr><th>Term</th><th>Auto</th><th>Override</th><th style={{width:36}}></th><th style={{width:36}}></th></tr></thead>
            <tbody>
              {vocab.map(row => (
                <tr key={row.id}>
                  <td style={{fontWeight:600}}>{row.term}</td>
                  <td style={{color:'var(--text-muted)'}}>{row.spoken_auto}</td>
                  <td>
                    {editingId === row.id ? (
                      <div style={{display:'flex',gap:4}}>
                        <input style={{flex:1,padding:'3px 6px',fontSize:13,background:'var(--bg)',border:'1px solid var(--accent)',borderRadius:3,color:'var(--text)',outline:'none',fontFamily:'Jost,sans-serif'}}
                          value={editValue} onChange={e => setEditValue(e.target.value)} autoFocus
                          onKeyDown={e => { if(e.key==='Enter') saveEdit(row.id); if(e.key==='Escape') setEditingId(null); }} />
                        <button className="btn btn-sm btn-primary" onClick={() => saveEdit(row.id)}>OK</button>
                      </div>
                    ) : (
                      <span style={{cursor:'pointer',color:row.spoken_override?'var(--accent)':'var(--text-muted)',fontStyle:row.spoken_override?'normal':'italic'}}
                        onClick={() => startEdit(row)}>
                        {row.spoken_override || 'click to set'}
                      </span>
                    )}
                  </td>
                  <td><PlayBtn text={row.spoken_override || row.spoken_auto} small /></td>
                  <td>
                    <button className={`btn btn-sm ${row.reviewed?'btn-success':''}`} onClick={() => toggleReviewed(row)} title={row.reviewed?'Reviewed':'Mark reviewed'}>
                      {row.reviewed ? '\u2713' : '\u00B7'}
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ==================== SENTENCES LIST ====================
function SentencesPage() {
  const [count, setCount] = useState(20);
  const [picking, setPicking] = useState(false);
  const [importing, setImporting] = useState(false);
  const [importResult, setImportResult] = useState(null);
  const [stats, setStats] = useState(null);

  const loadStats = () => api('/api/stats').then(setStats);
  useEffect(() => { loadStats(); }, []);

  const importSources = async () => {
    setImporting(true);
    setImportResult(null);
    try {
      const res = await api('/api/candidates/import', { method: 'POST' });
      setImportResult(res);
      loadStats();
    } catch (e) { alert('Import failed: ' + e.message); }
    setImporting(false);
  };

  const pickSentences = async () => {
    setPicking(true);
    await api('/api/sentences/generate', { method: 'POST', body: JSON.stringify({ count }) });
    loadStats();
    setPicking(false);
  };

  return (
    <div className="container">
      <h2>Sentences</h2>

      <div className="card">
        <h3>1. Import Sources (slow, do once)</h3>
        <p style={{color:'var(--text-muted)', fontSize:13, marginBottom:12}}>
          Scans blog posts and chat history for sentences containing vocab terms. Only needs to be done once (or when sources change).
        </p>
        <button className="btn btn-primary" onClick={importSources} disabled={importing}>
          {importing ? 'Scanning...' : 'Import Sources'}
        </button>
        {stats && <span style={{marginLeft:12, color:'var(--text-muted)', fontSize:13}}>{stats.candidates_total} candidates in pool</span>}
        {importResult && (
          <div style={{marginTop:8, fontSize:13, color:'var(--success)'}}>
            Found {importResult.found} sentences, {importResult.new} new. Pool: {importResult.total}
          </div>
        )}
      </div>

      <div className="card">
        <h3>2. Pick Sentences (instant)</h3>
        <p style={{color:'var(--text-muted)', fontSize:13, marginBottom:12}}>
          Randomly pick sentences from the candidate pool for review.
        </p>
        <div className="form-row">
          <div className="form-group"><label>Count</label>
            <input type="number" value={count} onChange={e => setCount(parseInt(e.target.value)||20)} min="1" max="500" />
          </div>
        </div>
        <button className="btn btn-primary" onClick={pickSentences} disabled={picking || !(stats && stats.candidates_total > 0)}>
          {picking ? 'Picking...' : 'Pick Sentences'}
        </button>
      </div>

      {stats && (
        <div className="card">
          <h3>Review Queue</h3>
          <div className="stats-grid">
            <div className="stat-card"><div className="value">{stats.sentences_total}</div><div className="label">Total</div></div>
            <div className="stat-card"><div className="value" style={{color:'var(--warning)'}}>{stats.sentences_pending}</div><div className="label">Pending</div></div>
            <div className="stat-card"><div className="value" style={{color:'var(--success)'}}>{stats.sentences_approved}</div><div className="label">Approved</div></div>
            <div className="stat-card"><div className="value" style={{color:'var(--danger)'}}>{stats.sentences_rejected}</div><div className="label">Rejected</div></div>
          </div>
          {stats.sentences_pending > 0 && (
            <a href="#/sentences/review" className="btn btn-success">Start Reviewing ({stats.sentences_pending} pending)</a>
          )}
        </div>
      )}
    </div>
  );
}

// ==================== FULL-SCREEN SENTENCE REVIEW ====================
function SentenceReview() {
  const [queue, setQueue] = useState([]);
  const [idx, setIdx] = useState(0);
  const [total, setTotal] = useState(0);
  const [reviewed, setReviewed] = useState(0);
  const [loading, setLoading] = useState(true);
  const [audioBuf, setAudioBuf] = useState(null);
  const [playing, setPlaying] = useState(false);
  const sourceRef = useRef(null);

  const loadQueue = async () => {
    setLoading(true);
    const st = await api('/api/stats');
    setTotal(st.sentences_total);
    setReviewed(st.sentences_approved + st.sentences_rejected);
    const items = await api('/api/sentences?status=pending&limit=200');
    setQueue(items);
    setIdx(0);
    setAudioBuf(null);
    setLoading(false);
  };

  useEffect(() => { loadQueue(); }, []);

  const current = queue[idx];

  // Auto-play TTS when sentence changes
  useEffect(() => {
    if (!current) return;
    let cancelled = false;
    setAudioBuf(null);
    setPlaying(false);
    fetchTtsBuffer(current.spoken).then(buf => {
      if (cancelled) return;
      setAudioBuf(buf);
      setPlaying(true);
      sourceRef.current = playBuffer(buf, () => setPlaying(false));
    }).catch(() => {});
    return () => { cancelled = true; if (sourceRef.current) try { sourceRef.current.stop(); } catch(e) {} };
  }, [current?.id]);

  const replay = () => {
    if (!audioBuf) return;
    if (sourceRef.current) try { sourceRef.current.stop(); } catch(e) {}
    setPlaying(true);
    sourceRef.current = playBuffer(audioBuf, () => setPlaying(false));
  };

  const act = async (status) => {
    if (!current) return;
    await api(`/api/sentences/${current.id}`, { method: 'POST', body: JSON.stringify({ status }) });
    if (sourceRef.current) try { sourceRef.current.stop(); } catch(e) {}
    setPlaying(false);
    setReviewed(r => r + 1);
    if (idx + 1 < queue.length) {
      setIdx(i => i + 1);
    } else {
      loadQueue();
    }
  };

  // Keyboard
  useEffect(() => {
    const handler = (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowRight') { e.preventDefault(); act('approved'); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); act('rejected'); }
      else if (e.key === ' ') { e.preventDefault(); replay(); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [current, audioBuf, idx, queue]);

  if (loading) return <div className="review-fullscreen"><div className="review-body"><p>Loading...</p></div></div>;

  if (!current) return (
    <div className="review-fullscreen">
      <div className="review-body">
        <div className="empty-state">
          <h3>All done!</h3>
          <p>No pending sentences to review.</p>
          <a href="#/sentences" className="btn" style={{marginTop:16}}>Back</a>
        </div>
      </div>
    </div>
  );

  const pct = total > 0 ? (reviewed / total * 100) : 0;

  return (
    <div className="review-fullscreen">
      <div className="review-topbar">
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <a href="#/sentences" className="btn btn-sm">&larr; Exit</a>
          <span style={{color:'var(--text-muted)',fontSize:14}}>{reviewed + 1} / {total}</span>
        </div>
        <div style={{flex:1,maxWidth:400,margin:'0 24px'}}>
          <div className="progress-bar"><div className="fill" style={{width:`${pct}%`}}></div></div>
        </div>
        <span className="badge badge-pending">{queue.length - idx - 1} remaining</span>
      </div>

      <div className="review-body">
        <div className="review-card">
          <div style={{marginBottom:24}}>
            <AlignedSentence text={current.text} spoken={current.spoken} />
          </div>
          {audioBuf && <Waveform audioBuffer={audioBuf} playing={playing} />}
          {!audioBuf && <div style={{height:80,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-muted)'}}>Loading audio...</div>}
        </div>
      </div>

      <div className="review-actions">
        <button className="review-action-btn reject" onClick={() => act('rejected')}>
          Reject<kbd>&larr;</kbd>
        </button>
        <button className="review-action-btn replay" onClick={replay}>
          Replay<kbd>space</kbd>
        </button>
        <button className="review-action-btn approve" onClick={() => act('approved')}>
          Approve<kbd>&rarr;</kbd>
        </button>
      </div>
    </div>
  );
}

// ==================== JOBS ====================
function JobsPage() {
  const [jobs, setJobs] = useState([]);
  const [selected, setSelected] = useState(null);
  useEffect(() => { api('/api/jobs').then(setJobs); }, []);
  const viewJob = async (id) => { setSelected(await api(`/api/jobs/${id}`)); };
  return (
    <div className="container">
      <h2>Jobs</h2>
      {jobs.length === 0 ? <div className="empty-state"><h3>No jobs yet</h3></div> : (
        <div className="card" style={{padding:0,overflow:'hidden'}}>
          <table>
            <thead><tr><th>ID</th><th>Type</th><th>Status</th><th>Created</th><th></th></tr></thead>
            <tbody>{jobs.map(j => (
              <tr key={j.id}><td>{j.id}</td><td>{j.job_type}</td><td><span className={`badge badge-${j.status}`}>{j.status}</span></td><td style={{color:'var(--text-muted)',fontSize:13}}>{j.created_at}</td><td><button className="btn btn-sm" onClick={() => viewJob(j.id)}>View</button></td></tr>
            ))}</tbody>
          </table>
        </div>
      )}
      {selected && (
        <div className="card" style={{marginTop:16}}>
          <h3>Job #{selected.id} — {selected.job_type}</h3>
          <span className={`badge badge-${selected.status}`}>{selected.status}</span>
          {selected.log && <pre style={{marginTop:12,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,padding:12,fontFamily:'monospace',fontSize:12,maxHeight:300,overflowY:'auto',color:'var(--text-muted)',whiteSpace:'pre-wrap'}}>{selected.log}</pre>}
        </div>
      )}
    </div>
  );
}

// ==================== APP ====================
function App() {
  const hash = useHash();
  let page;
  if (hash === '#/sentences/review') page = <SentenceReview />;
  else if (hash.startsWith('#/vocab')) page = <VocabPage />;
  else if (hash.startsWith('#/sentences')) page = <SentencesPage />;
  else if (hash.startsWith('#/jobs')) page = <JobsPage />;
  else page = <Overview />;
  return (<><Nav />{page}</>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
